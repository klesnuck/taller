<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Auto Servicio San Jorge</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f6f9;
      display: flex;
    }

    /* Sidebar */
    .sidebar {
      width: 220px;
      background: #2f6fed;
      color: white;
      height: 100vh;
      padding: 20px;
    }

    .sidebar h2 {
      font-size: 18px;
    }

    .menu {
      margin-top: 20px;
    }

    .menu a {
      display: block;
      color: white;
      text-decoration: none;
      padding: 10px;
      border-radius: 8px;
      margin-bottom: 5px;
    }

    .menu a:hover, .menu a.active {
      background: rgba(255,255,255,0.2);
    }

    /* Main */
    .main {
      flex: 1;
      padding: 20px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 12px;
      margin-top: 20px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    .filters {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    input, select, button {
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      background: #2f6fed;
      color: white;
      cursor: pointer;
      grid-column: span 4;
    }

    .stats {
      display: flex;
      gap: 20px;
    }

    .stat {
      flex: 1;
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      padding: 10px;
      border-bottom: 1px solid #ddd;
      text-align: left;
    }

    .tag {
      padding: 5px 10px;
      border-radius: 10px;
      color: white;
      font-size: 12px;
    }

    .efectivo { background: green; }
    .tarjeta { background: blue; }
    .transferencia { background: purple; }

  </style>
</head>
<body>

  <div class="sidebar">
    <h2>Auto Servicio<br>San Jorge</h2>
    <div class="menu">
      <a href="#">Dashboard</a>
      <a href="#">Inventario</a>
      <a href="#">Ventas</a>
      <a href="#" class="active">Reportes</a>
      <a href="#">Pagos</a>
      <a href="#">Clientes</a>
    </div>
  </div>

  <div class="main">

    <div class="header">
      <h1>Reporte de Ventas</h1>
      <span>Administrador</span>
    </div>

    <div class="card">
      <h3>Filtros</h3>
      <div class="filters">
        <input type="date">
        <input type="date">
        <select>
          <option>Todos los clientes</option>
        </select>
        <select>
          <option>Todos los métodos</option>
        </select>
        <button onclick="generarReporte()">Generar Reporte</button>
      </div>
    </div>

    <div class="stats">
      <div class="stat">
        <h3>Total Ventas</h3>
        <h2 id="totalVentas">$0</h2>
      </div>
      <div class="stat">
        <h3>Número Ventas</h3>
        <h2 id="numVentas">0</h2>
      </div>
    </div>

    <div class="card">
      <h3>Historial de Ventas</h3>
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Cliente</th>
            <th>Servicio</th>
            <th>Fecha</th>
            <th>Total</th>
            <th>Método</th>
          </tr>
        </thead>
        <tbody id="tablaVentas"></tbody>
      </table>
    </div>

  </div>

  <script>
    const ventas = [
      {id:'V-001', cliente:'Carlos', servicio:'Aceite', fecha:'2024-01-10', total:1250, metodo:'efectivo'},
      {id:'V-002', cliente:'Ana', servicio:'Alineación', fecha:'2024-01-11', total:850, metodo:'tarjeta'},
      {id:'V-003', cliente:'Juan', servicio:'Frenos', fecha:'2024-01-12', total:3200, metodo:'transferencia'}
    ];

    function generarReporte() {
      const tabla = document.getElementById('tablaVentas');
      tabla.innerHTML = '';

      let total = 0;

      ventas.forEach(v => {
        total += v.total;

        tabla.innerHTML += `
          <tr>
            <td>${v.id}</td>
            <td>${v.cliente}</td>
            <td>${v.servicio}</td>
            <td>${v.fecha}</td>
            <td>$${v.total}</td>
            <td><span class="tag ${v.metodo}">${v.metodo}</span></td>
          </tr>
        `;
      });

      document.getElementById('totalVentas').innerText = '$' + total;
      document.getElementById('numVentas').innerText = ventas.length;
    }

    generarReporte();
  </script>

</body>
</html>
